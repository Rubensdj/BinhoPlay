                        { msg: 'ALERTA! Email encontrado em vazamento     "Collection #1"', delay: 1200, type: 'error' },
                        { msg: 'Dados expostos: Nome, IP, Senha (Hash MD5)',                                                                    delay: 1600, type: 'warning' },
                        { msg: 'Hash recuperado:                          5f4dcc3b5aa765d61d8327deb882cf99', delay: 2000, type: 'info' },
                        { msg: 'Senha revelada (cracked): "senha123"', delay:
    2400, type: 'error' },                                                                ];
                } else if (type === 'ip') {
                    addLog('APLICANDO WHOIS & GEOIP...', 'info');
                    simulation = [                                                            { msg: 'Resolvendo: 192.168.1.100 (Simulado)', delay:
    500 },
                        { msg: 'ISP: Provedor Fictício Ltda', delay: 800 },
                        { msg: 'País: Brasil (BR)', delay: 1100 },
                        { msg: 'Configurações de Firewall: Portas 80, 443                                                                       ABERTAS', delay: 1400, type: 'warning' },
                        { msg: 'LOCAL: São Paulo, SP - Centro', delay: 1800,
    result: 'geo' },                                                                      ];
                } else if (type === 'photos') {                                           addLog('EXTRAIENDO METADADOS EXIF...', 'info');
                    simulation = [
                        { msg: 'Analisando arquivo: foto_natal.jpg', delay: 500 },
                        { msg: 'Camera: iPhone 13 Pro', delay: 800 },                         { msg: 'Data: 25/12/2023 20:45:12', delay: 1100 },
                        { msg: 'GPS LAT: -23.5505 / LON: -46.6333', delay:
    1500, type: 'success' },                                                                  { msg: 'LOCAL DECODE: Av. Paulista, 1000', delay:
    1900, type: 'warning' },
                    ];                                                                }

                let totalDelay = 0;
                simulation.forEach(step => {
                    totalDelay = step.delay;
                    setTimeout(() => {
                        addLog(step.msg, step.type || 'info');

                        if(step.result === 'instagram') {
                            showResult('instagram', 'Perfil Encontrado no
    Instagram', 'Bio: "Amante de churrasco e jogos. SP."<br>Seguidores:                                                                         1.2k<br>Última foto: Praia de Santos');
                        } else if(step.result === 'twitter') {
                            showResult('twitter', 'Perfil Encontrado no X
    (Twitter)', '@joaosilva_oficial<br>Seguindo 500 contas<br>Último Tweet:
    "Ontem foi um dia!"');
                        } else if(step.result === 'facebook') {                                   showResult('facebook', 'Perfil Não Encontrado', 'O
    usuário configurou perfil privado.<br>GitHub sugere que o nome não existe.');                                                                                   } else if(step.result === 'github') {
                            showResult('github', 'Perfil Encontrado no
    GitHub', 'Repositórios públicos:<br>- meu-site<br>- script-python');
                        } else if(step.result === 'geo') {
                            showResult('geo', 'Geolocalização Confirmada',
    'Coordenadas: -23.5505, -46.6333<br>Mapa: [Simulado] Av. Paulista 1000, SP');
                        }                                             
                    }, step.delay);                                                   });
            }                                                         
            function showResult(id, title, content) {
                const div = document.createElement('div');
                div.className = 'card border-l-4 ' + (id === 'facebook' ?
    'border-red-500' : 'border-green-500');
                div.innerHTML = `
                    <h3 class="font-bold text-lg mb-2 text-white">${title}</h3>
                    <div class="text-sm text-gray-300 break-words">${content}</div>
                    <button class="mt-2 text-xs text-blue-400
    hover:text-blue-300 underline"                                        onclick="this.parentElement.remove()">Fechar Resultado</button>
                `;
                resultsArea.prepend(div);
            }
        </script>
